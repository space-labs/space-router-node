name: Build Home Node

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: pytest tests/ -v

  build:
    needs: test
    environment: release
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact_base: spacerouter-cli-macos-arm64
          - os: windows-latest
            artifact_base: spacerouter-cli-windows-x64
          - os: ubuntu-latest
            artifact_base: spacerouter-cli-linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="v0.0.0-dev.${{ github.run_number }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${VERSION}"

      - name: Compute artifact name
        id: artifact
        shell: bash
        run: |
          PKG_VERSION="${{ steps.version.outputs.version }}"
          PKG_VERSION="${PKG_VERSION#v}"
          echo "name=${{ matrix.artifact_base }}-${PKG_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      # ---- macOS: import signing certificate BEFORE build ----
      # PyInstaller needs the identity to sign embedded frameworks with the
      # same Team ID as the outer binary (macOS Sequoia enforces this).
      - name: Import macOS signing certificate
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        shell: bash
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          rm -f "$RUNNER_TEMP/cert.p12"

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "CODESIGN_IDENTITY=$APPLE_SIGNING_IDENTITY" >> "$GITHUB_ENV"

      - name: Freeze version into binary
        shell: bash
        run: |
          echo "BUILD_VERSION = \"${{ steps.version.outputs.version }}\"" > app/_build_version.py
          echo "BUILD_VARIANT = \"production\"" > app/_build_variant.py

      - name: Build binary
        run: pyinstaller homenode.spec

      - name: Rename artifact
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv dist/space-router-node.exe "dist/${{ steps.artifact.outputs.name }}.exe"
          else
            mv dist/space-router-node "dist/${{ steps.artifact.outputs.name }}"
          fi

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: bash tests/e2e/smoke_test.sh "dist/${{ steps.artifact.outputs.name }}"
        env:
          EXPECTED_VERSION: ${{ steps.version.outputs.version }}
          SR_PUBLIC_IP: 127.0.0.1
          SR_UPNP_ENABLED: "false"
          SR_NODE_PORT: "19090"
          SR_WALLET_ADDRESS: "0x0000000000000000000000000000000000000001"

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\tests\e2e\smoke_test.ps1 -Binary "dist\${{ steps.artifact.outputs.name }}.exe"
        env:
          EXPECTED_VERSION: ${{ steps.version.outputs.version }}
          SR_PUBLIC_IP: 127.0.0.1
          SR_UPNP_ENABLED: "false"
          SR_NODE_PORT: "19090"
          SR_WALLET_ADDRESS: "0x0000000000000000000000000000000000000001"

      # ---- Windows code signing via Azure Trusted Signing ----
      # Step 1: Sign the raw binary BEFORE building the NSIS installer so the
      # installer embeds an already-signed executable.  A file-lock wait is
      # needed because Windows Defender scans the binary after the smoke test
      # runs it, holding a transient write lock.
      - name: Azure login (Windows)
        if: runner.os == 'Windows'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Wait for file lock and sign Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binary = "dist\${{ steps.artifact.outputs.name }}.exe"
          Write-Host "Waiting for $binary to be writable..."
          for ($i = 0; $i -lt 60; $i++) {
              try {
                  $fs = [IO.File]::Open($binary, 'Open', 'ReadWrite', 'None')
                  $fs.Close()
                  Write-Host "File is writable after $i seconds"
                  break
              } catch {
                  if ($i % 10 -eq 0) { Write-Host "  Still locked ($i s)..." }
                  Start-Sleep -Seconds 1
              }
          }

      - name: Sign Windows binary
        if: runner.os == 'Windows'
        uses: azure/trusted-signing-action@v0.5.0
        with:
          endpoint: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_TRUSTED_SIGNING_CERT_PROFILE }}
          files-folder: dist
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      # Build Windows NSIS installer with WinSW service wrapper.
      # The binary is already signed, so the installer embeds a signed exe.
      - name: Download WinSW
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $winsw_version = "3.0.0-alpha.11"
          $url = "https://github.com/winsw/winsw/releases/download/v${winsw_version}/WinSW-x64.exe"
          Invoke-WebRequest -Uri $url -OutFile "packaging/windows/WinSW-x64.exe"
          Write-Host "Downloaded WinSW ${winsw_version}"

      - name: Install NSIS
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $nsisPath = "C:\Program Files (x86)\NSIS\makensis.exe"

          # Check if NSIS is already pre-installed on the runner
          if (Test-Path $nsisPath) {
              Write-Host "NSIS already installed at $nsisPath"
              exit 0
          }

          # Retry choco install up to 3 times (Chocolatey CDN can be flaky)
          $maxRetries = 3
          for ($i = 1; $i -le $maxRetries; $i++) {
              Write-Host "Installing NSIS (attempt $i/$maxRetries)..."
              choco install nsis -y --no-progress 2>&1
              # Verify makensis.exe actually exists (choco can return 0 with 0 packages on 503)
              if (Test-Path $nsisPath) {
                  Write-Host "NSIS installed successfully"
                  break
              }
              if ($i -lt $maxRetries) {
                  Write-Host "makensis.exe not found after install, retrying in 15 seconds..."
                  Start-Sleep -Seconds 15
              } else {
                  Write-Error "Failed to install NSIS after $maxRetries attempts"
                  exit 1
              }
          }

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:PATH = "C:\Program Files (x86)\NSIS;$env:PATH"

          $version = "${{ steps.version.outputs.version }}"
          # Strip leading 'v' for installer version
          $pkg_version = $version -replace '^v', ''
          # Extract numeric-only version for VIProductVersion (X.X.X.X format)
          if ($pkg_version -match '^(\d+\.\d+\.\d+)') {
              $numeric_version = "$($Matches[1]).0"
          } else {
              $numeric_version = "0.0.0.0"
          }

          makensis /DVERSION=$pkg_version `
                   /DNUMERIC_VERSION=$numeric_version `
                   /DBINARY="..\..\dist\${{ steps.artifact.outputs.name }}.exe" `
                   /DWINSW="WinSW-x64.exe" `
                   packaging\windows\installer.nsi

          Move-Item "packaging\windows\space-router-node-${pkg_version}-setup.exe" `
                    "dist\${{ steps.artifact.outputs.name }}-setup.exe"
          Write-Host "Built installer: dist\${{ steps.artifact.outputs.name }}-setup.exe"

      # Step 2: Sign the NSIS installer (freshly created, no lock issues)
      - name: Sign Windows installer
        if: runner.os == 'Windows'
        uses: azure/trusted-signing-action@v0.5.0
        with:
          endpoint: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_TRUSTED_SIGNING_CERT_PROFILE }}
          files-folder: dist
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      # ---- macOS code signing & notarization (cert already imported above) ----
      - name: Sign macOS binary
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        shell: bash
        run: |
          codesign --force --options runtime \
            --sign "$APPLE_SIGNING_IDENTITY" \
            --timestamp \
            "dist/${{ steps.artifact.outputs.name }}"

      - name: Notarize macOS binary
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          # Create a zip for notarization (notarytool requires zip/dmg/pkg)
          ditto -c -k --keepParent "dist/${{ steps.artifact.outputs.name }}" "$RUNNER_TEMP/notarize.zip"

          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # Note: stapling is not supported for raw Mach-O binaries — only .app/.dmg/.pkg
          # Gatekeeper will perform an online notarization check when the binary is first run

      # Build .pkg from the signed+notarized binary so the payload passes Gatekeeper
      - name: Build macOS package
        if: runner.os == 'macOS'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PKG_VERSION="${VERSION#v}"
          bash packaging/macos/build_pkg.sh \
            --binary "dist/${{ steps.artifact.outputs.name }}" \
            --version "${PKG_VERSION}" \
            --output "dist/${{ steps.artifact.outputs.name }}.pkg"

      - name: Sign and notarize macOS package
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          PKG="dist/${{ steps.artifact.outputs.name }}.pkg"
          [ -f "$PKG" ] || exit 0

          # productsign requires a "Developer ID Installer" cert which may
          # not be in the P12.  Skip notarization if signing fails.
          if productsign --sign "Developer ID Installer: Gluwa ($APPLE_TEAM_ID)" \
              "$PKG" "$PKG.signed" 2>/dev/null; then
            mv "$PKG.signed" "$PKG"
            echo "Signed .pkg — submitting for notarization..."
            xcrun notarytool submit "$PKG" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
            xcrun stapler staple "$PKG"
          else
            echo "Installer signing cert not found — .pkg will be unsigned (skipping notarization)"
          fi

      - name: Clean up macOS keychain
        if: always() && runner.os == 'macOS' && env.KEYCHAIN_PATH != ''
        shell: bash
        run: security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

      # Build Linux packages (.deb and .rpm) via nfpm
      - name: Build Linux packages
        if: runner.os == 'Linux'
        shell: bash
        run: |
          # Install nfpm via go install
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          export PATH="$(go env GOPATH)/bin:$PATH"

          VERSION="${{ steps.version.outputs.version }}"
          # Strip leading 'v' for package version
          PKG_VERSION="${VERSION#v}"
          ARTIFACT="${{ steps.artifact.outputs.name }}"

          # Update nfpm.yaml source path to match the versioned artifact name
          sed -i "s|dist/space-router-node-linux-x64|dist/${ARTIFACT}|" nfpm.yaml

          # Build .deb
          VERSION="${PKG_VERSION}" nfpm package --packager deb --target "dist/${ARTIFACT}.deb"

          # Build .rpm
          VERSION="${PKG_VERSION}" nfpm package --packager rpm --target "dist/${ARTIFACT}.rpm"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: |
            dist/${{ steps.artifact.outputs.name }}
            dist/${{ steps.artifact.outputs.name }}.exe
            dist/${{ steps.artifact.outputs.name }}-setup.exe
            dist/${{ steps.artifact.outputs.name }}.deb
            dist/${{ steps.artifact.outputs.name }}.rpm
            dist/${{ steps.artifact.outputs.name }}.pkg

  build-gui:
    needs: test
    environment: release
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact_base: spacerouter-gui-macos-arm64
          - os: windows-latest
            artifact_base: spacerouter-gui-windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="v0.0.0-dev.${{ github.run_number }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building GUI version: ${VERSION}"

      - name: Compute artifact name
        id: artifact
        shell: bash
        run: |
          PKG_VERSION="${{ steps.version.outputs.version }}"
          PKG_VERSION="${PKG_VERSION#v}"
          echo "name=${{ matrix.artifact_base }}-${PKG_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller pywebview

      # ---- macOS: import signing certificate BEFORE build ----
      - name: Import macOS signing certificate
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        shell: bash
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          rm -f "$RUNNER_TEMP/cert.p12"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "CODESIGN_IDENTITY=$APPLE_SIGNING_IDENTITY" >> "$GITHUB_ENV"

      - name: Freeze version into binary
        shell: bash
        run: |
          echo "BUILD_VERSION = \"${{ steps.version.outputs.version }}\"" > app/_build_version.py
          echo "BUILD_VARIANT = \"production\"" > app/_build_variant.py

      - name: Build GUI app
        run: pyinstaller spacerouter_gui.spec

      # ---- GUI smoke tests (before signing, after build) ----
      - name: GUI smoke test (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: bash tests/e2e/gui_smoke_test.sh "dist/SpaceRouter.app/Contents/MacOS/SpaceRouter"
        timeout-minutes: 3

      - name: GUI smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\tests\e2e\gui_smoke_test.ps1 -Binary "dist\SpaceRouter.exe"
        timeout-minutes: 3

      # ---- macOS code signing & notarization (cert already imported above) ----
      - name: Sign macOS app
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        shell: bash
        run: |
          codesign --force --deep --options runtime \
            --sign "$APPLE_SIGNING_IDENTITY" \
            --timestamp \
            "dist/SpaceRouter.app"

      # Create .dmg from the (now signed) .app bundle.
      # Retry because hdiutil can fail with "Resource busy" right after codesign
      # while Gatekeeper/XProtect finishes scanning the signed bundle.
      - name: Package macOS DMG
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if [ -d "dist/SpaceRouter.app" ]; then
            for attempt in 1 2 3; do
              if hdiutil create -volname "SpaceRouter" \
                   -srcfolder "dist/SpaceRouter.app" \
                   -ov -format UDZO \
                   "dist/${{ steps.artifact.outputs.name }}.dmg"; then
                break
              fi
              if [ "$attempt" -lt 3 ]; then
                echo "hdiutil failed (attempt $attempt/3), retrying in 5s..."
                sleep 5
              fi
            done
            if [ ! -f "dist/${{ steps.artifact.outputs.name }}.dmg" ]; then
              echo "All hdiutil attempts failed"
              exit 1
            fi
          fi

      - name: Notarize macOS DMG
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          DMG="dist/${{ steps.artifact.outputs.name }}.dmg"
          if [ -f "$DMG" ]; then
            xcrun notarytool submit "$DMG" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
            xcrun stapler staple "$DMG"
          fi

      - name: Clean up macOS keychain
        if: always() && runner.os == 'macOS' && env.KEYCHAIN_PATH != ''
        shell: bash
        run: security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

      # ---- Windows: rename and sign ----
      # Onefile mode produces dist/SpaceRouter.exe directly
      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path "dist\SpaceRouter.exe") {
            Move-Item "dist\SpaceRouter.exe" "dist\${{ steps.artifact.outputs.name }}.exe"
          } else {
            Write-Error "SpaceRouter.exe not found in dist\"
            Get-ChildItem dist\ | Select-Object FullName
            exit 1
          }

      # ---- Windows code signing via Azure Trusted Signing ----
      - name: Azure login (Windows)
        if: runner.os == 'Windows'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows GUI executable
        if: runner.os == 'Windows'
        uses: azure/trusted-signing-action@v0.5.0
        with:
          endpoint: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_TRUSTED_SIGNING_CERT_PROFILE }}
          files-folder: dist
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: |
            dist/${{ steps.artifact.outputs.name }}.exe
            dist/${{ steps.artifact.outputs.name }}.dmg

  release:
    needs: [build, build-gui]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Space Router Home Node ${{ github.ref_name }}"
          files: artifacts/**/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
