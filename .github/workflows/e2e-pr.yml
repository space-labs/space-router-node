name: "PR Check"

on:
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: pytest tests/ -v

  # Lightweight build check — single platform (Linux), no signing, no
  # installers. Catches PyInstaller/import breakage without burning macOS
  # or Windows runner minutes. Full multi-platform build runs on merge.
  build-check:
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Freeze version into binary
        run: |
          echo 'BUILD_VERSION = "v0.0.0-pr.${{ github.event.number }}"' > app/_build_version.py
          echo 'BUILD_VARIANT = "test"' > app/_build_variant.py

      - name: Build binary
        run: pyinstaller homenode.spec

      - name: Smoke test
        run: bash tests/e2e/smoke_test.sh dist/space-router-node
        env:
          EXPECTED_VERSION: "v0.0.0-pr.${{ github.event.number }}"
          SR_PUBLIC_IP: 127.0.0.1
          SR_UPNP_ENABLED: "false"
          SR_NODE_PORT: "19090"
          SR_WALLET_ADDRESS: "0x0000000000000000000000000000000000000001"
